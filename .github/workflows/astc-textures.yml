name: AstcNexus Texture Pipeline (MC 1.21.11)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-textures:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 21

    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y curl unzip jq rsync zip

    - name: Download Minecraft 1.21.11 client + assets
      run: |
        mkdir -p workspace
        cd workspace
        curl -s https://launchermeta.mojang.com/mc/game/version_manifest.json -o version_manifest.json
        VERSION_URL=$(jq -r '.versions[] | select(.id=="1.21.11") | .url' version_manifest.json)
        curl -s "$VERSION_URL" -o mc_1_21_11.json
        CLIENT_URL=$(jq -r '.downloads.client.url' mc_1_21_11.json)
        curl -L "$CLIENT_URL" -o client.jar
        mkdir -p assets_raw
        unzip -q client.jar "assets/minecraft/textures/*" -d assets_raw

    - name: Sort textures
      run: |
        mkdir -p sorted/gui sorted/block sorted/item sorted/environment sorted/skin
        rsync -a workspace/assets_raw/assets/minecraft/textures/gui/ sorted/gui/ || true
        rsync -a workspace/assets_raw/assets/minecraft/textures/block/ sorted/block/ || true
        rsync -a workspace/assets_raw/assets/minecraft/textures/item/ sorted/item/ || true
        rsync -a workspace/assets_raw/assets/minecraft/textures/environment/ sorted/environment/ || true
        find workspace/assets_raw/assets/minecraft/textures/entity -maxdepth 1 -type f -name "*steve*.png" -exec cp {} sorted/skin/ \;
        find workspace/assets_raw/assets/minecraft/textures/entity -maxdepth 1 -type f -name "*alex*.png" -exec cp {} sorted/skin/ \;

    - name: Build ASTC encoder
      run: |
        git clone https://github.com/ARM-software/astc-encoder.git
        cd astc-encoder
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)
        cd ../..
        cp astc-encoder/build/Source/astcenc astcenc

    - name: Convert textures to ASTC
      run: |
        chmod +x pipeline/convert_astc.sh
        ./pipeline/convert_astc.sh "$(pwd)/sorted" "$(pwd)/resourcepack"

    - name: Pack resource pack
      run: |
        chmod +x pipeline/pack_resourcepack.sh
        ./pipeline/pack_resourcepack.sh "$(pwd)/resourcepack" astcnexus-astc-pack.zip

    - name: Upload ASTC resource pack
      uses: actions/upload-artifact@v4
      with:
        name: astcnexus-astc-pack
        path: astcnexus-astc-pack.zip
