name: Build ASTC Tools for Android ARM64

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout this repo
      uses: actions/checkout@v4

    - name: Clone ASTC Encoder source
      run: |
        git clone https://github.com/ARM-software/astc-encoder.git
        cd astc-encoder
        git checkout main

    - name: Install Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26d

    - name: Build ASTCENC for Android ARM64
      run: |
        cd astc-encoder
        mkdir build-android
        cd build-android
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-24 \
          -DCMAKE_BUILD_TYPE=Release \
          -DASTCENC_ISA_NEON=ON \
          -DASTCENC_ISA_NATIVE=OFF
        make -j$(nproc)

    - name: Copy binaries to repo root
      run: |
        cp astc-encoder/build-android/Source/astcenc .
        cp astc-encoder/build-android/Source/astcdec .
        cp astc-encoder/build-android/Source/astcinfo .

    - name: Upload binaries to workflow artifacts
      uses: actions/upload-artifact@v4
      with:
        name: astc-tools-android-arm64
        path: |
          astcenc
          astcdec
          astcinfo

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: android-arm64-build
        name: Android ARM64 Build
        files: |
          astcenc
          astcdec
          astcinfo
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
